version: '3.8'
services:

  # -----------------------------------------------------------------------
  # MongoDB — single-node replica set (dev)
  # Replica set is required to enable transactions & oplog in dev parity.
  # -----------------------------------------------------------------------
  mongo:
    image: mongo:6.0
    container_name: vami_mongo_local
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_local:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Initialise the replica set on first boot
  mongo-init:
    image: mongo:6.0
    container_name: vami_mongo_init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command: >
      mongosh --host mongo:27017
        --eval '
          try {
            rs.status();
            print("Already initialised");
          } catch(e) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "localhost:27017" }] });
            print("Initialised rs0");
          }
        '

  # -----------------------------------------------------------------------
  # Redis
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vami_redis_local
    ports:
      - "6379:6379"

  # -----------------------------------------------------------------------
  # MinIO — S3-compatible object storage for local development
  # API:     http://localhost:9000
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  # -----------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: vami_minio_local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_local:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Creates the default bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: vami_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/vami-media;
        mc anonymous set download local/vami-media;
        echo 'MinIO bucket ready';
      "

volumes:
  mongo_data_local:
  minio_data_local:
