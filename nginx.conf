events {}
http {
    upstream vami_backend {
        # least_conn distributes traffic evenly without session stickiness.
        # Session stickiness (ip_hash) is NOT needed because the Redis
        # Socket.IO adapter routes all socket events across nodes.
        least_conn;
        server api:3000;
    }

    server {
        listen 80;

        # Forward real client IP so rate-limiter counters are per-IP, not per-pod
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location / {
            proxy_pass http://vami_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
